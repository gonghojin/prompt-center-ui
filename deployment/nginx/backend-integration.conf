# 백엔드 nginx.conf에 추가할 프론트엔드 설정
# 기존 "정적 파일 서빙 (향후 프론트엔드 추가 시)" 부분을 아래 설정으로 교체하세요

upstream frontend {
    server frontend-container:3000;  # 프론트엔드 컨테이너명:포트
    keepalive 32;
}

# 기존 upstream backend는 그대로 유지
# upstream backend {
#     server backend:8080;
#     keepalive 32;
# }

server {
    listen 80;
    server_name localhost;  # 개발서버 도메인으로 변경

    # 보안 헤더 추가
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # API 요청 프록시 (기존 설정 그대로 유지)
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        # 타임아웃 설정
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 버퍼링 설정
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Swagger UI (기존 설정 그대로 유지)
    location /swagger-ui.html {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api-docs/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 헬스체크 (기존 설정 그대로 유지)
    location /actuator/health {
        proxy_pass http://backend;
        access_log off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 모니터링 엔드포인트 (기존 설정 그대로 유지)
    location /actuator/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 접근 제한 (필요시 IP 제한 추가)
        # allow 192.168.1.0/24;
        # deny all;
    }

    # === 프론트엔드 관련 설정 (새로 추가) ===
    
    # Next.js 정적 파일들 (_next로 시작하는 모든 요청)
    location /_next/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 정적 파일 캐싱
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js 이미지 최적화
    location /_next/image {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 정적 파일들 (이미지, 폰트, CSS, JS 등)
    location ~ \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|css|js|map)$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 정적 파일 캐싱
        expires 30d;
        add_header Cache-Control "public";
    }

    # favicon 404 에러 방지 (기존 설정을 프론트엔드 프록시로 변경)
    location = /favicon.ico {
        proxy_pass http://frontend;
        log_not_found off;
        access_log off;
    }

    # robots.txt (기존 설정을 프론트엔드 프록시로 변경)
    location = /robots.txt {
        proxy_pass http://frontend;
        log_not_found off;
        access_log off;
    }

    # 숨김 파일 접근 차단 (기존 설정 그대로 유지)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 모든 다른 요청을 프론트엔드로 프록시 (Next.js 라우팅)
    # 기존 "정적 파일 서빙" 부분을 이 설정으로 교체
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        # WebSocket 지원 (Next.js HMR 등)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Next.js 라우팅 지원
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;

        # 타임아웃 설정
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
} 