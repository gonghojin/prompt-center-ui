version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8080
    networks:
      - prompth-center_prompt-network
    restart: unless-stopped
    depends_on:
      - backend
    # 헬스체크 추가
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 리소스 제한 (선택사항)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  prompth-center_prompt-network:
    external: true 