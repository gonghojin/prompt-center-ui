version: '3.8'

services:
  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.production
    env_file:
      - ../../.env.production
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_INTEGRATED=false
    networks:
      - prompt-center-network
    restart: unless-stopped
    # 내부 네트워크에서만 접근 (nginx 통해서만)
    expose:
      - "3000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "3443:443"
    volumes:
      - ../nginx/standalone.conf:/etc/nginx/nginx.conf:ro
      - ../../ssl:/etc/nginx/ssl:ro
    networks:
      - prompt-center-network
    restart: unless-stopped
    depends_on:
      - frontend
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  prompt-center-network:
    driver: bridge 